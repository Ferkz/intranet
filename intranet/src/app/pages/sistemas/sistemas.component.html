<div class="container">
  <div class="menu">
    <div class="card-principal">
      <a [href]="systemLink" target="_blank" class="link">
      <mat-card class="card" *ngFor="let sistema of sistemas; let i = index">
        <mat-icon>{{ icons[i]?.icon  }}</mat-icon>
        <mat-card-actions align="end">
          <button mat-button routerLink="">
            <p>{{ systemName }}</p>
          </button>
        </mat-card-actions>
      </mat-card>
    </a>
    </div>
  </div>
 </div>
